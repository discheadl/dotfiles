
# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Cuando presiones la tecla "Launch4" (el botón con el logo de ROG)
# Ejecuta la ventana visual tipo Armoury Crate
bind = , XF86Launch1, exec, rog-control-center

# Cuando presiones la tecla de ventiladores (Fn+F5 o la dedicada)
# Ejecuta el comando para cambiar al siguiente perfil (Silent -> Balanced -> Turbo)
# La "-n" significa "next" (siguiente)
bind = , XF86Launch4, exec, asusctl profile next

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
# bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, M, exec, hyprctl dispatch exit
bind = $mainMod, L, exec, pidof hyprlock || hyprlock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, pkill -x quickshell; quickshell -p ~/.config/quickshell/top-bar/shell.qml & disown
#bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, fullscreen, 1

#Modes
bind = $mainMod, D, exec, /home/dischead/.config/hypr/shaders/reading_mode.sh 

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Swap windows
bind = $mainMod CTRL, left, swapwindow, l
bind = $mainMod CTRL, right, swapwindow, r
bind = $mainMod CTRL, up, swapwindow, u
bind = $mainMod CTRL, down, swapwindow, d

# Move Windows
bind = ALT, comma, movetoworkspacesilent, r-1
bind = ALT, period, movetoworkspacesilent, r+1
bind = ALT, semicolon, movetoworkspace, r-1
bind = ALT, apostrophe, movetoworkspace, r+1

# Switch workspaces with mainMod + [0-9]
bind = CONTROL, left, workspace, e-1
bind = CONTROL, right, workspace, +1
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

bind = ALT, Tab, global, quickshell:overviewToggle 

# WOFI
bind = $mainMod, space, exec, pkill rofi || rofi -show drun 

# -----------------------------------------------------
# SCREENSHOTS (Todo guardado en ~/Pictures/Screenshots)
# -----------------------------------------------------

# 1. Tecla "Print" sola -> RECORTAR (Guarda, copia y NOTIFICA)
bind = , Print, exec, bash -c 'img=~/Pictures/Screenshots/$(date +"%Y-%m-%d-%H%M%S.png"); grim "$img" && wl-copy < "$img" && notify-send -h string:image-path:"$img" "Captura de pantalla" "Guardada y copiada al portapapeles"'
# 2. Tecla "Shift + Print" -> RECORTAR (Misma función)
bind = SHIFT, Print, exec, bash -c 'img=~/Pictures/Screenshots/$(date +"%Y-%m-%d-%H%M%S.png"); grim -g "$(slurp)" "$img" && wl-copy < "$img" && notify-send -h string:image-path:"$img" "Recorte de pantalla" "Guardado y copiado al portapapeles"'

# Dolphin Preview
bind = ALT, SPACE, exec, /usr/share/dolphin-quick-view/dolphin_quick_view_shortcut.sh

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindl = , XF86AudioMicMute, exec, ~/.config/hypr/scripts/osd-mic.sh
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# keybard Brightness

bindel = , XF86KbdBrightnessUp, exec, asusctl leds next
bindel = , XF86KbdBrightnessDown, exec, asusctl leds prev


# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod, P, exec, ~/.config/hypr/scripts/display-mode.sh