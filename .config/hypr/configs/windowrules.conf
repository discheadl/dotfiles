
# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = fullscreen-no-rounding
    match:fullscreen = true
    rounding = 0
    border_size = 0
}

windowrule {
    name = flutter-emulator-float
    match:class = ^(Emulator)$
    float = yes
    size = 450 850
    center = yes
}

windowrule {
    name = network-manager-float
    match:class = nm-connection-editor
    float = yes
    center = yes
    size = 600 500
}

windowrule {
    name = blueman-manager-float
    match:class = blueman-manager
    float = yes
    center = yes
    size = 600 500
}

windowrule {
    name = pavucontrol-float
    match:class = pavucontrol
    float = yes
    center = yes
    size = 800 500
}

windowrule {
  name = discord-transparency
  match:class = ^(discord|Vesktop|WebCord)$
  opacity = 0.92 override 0.85 override 1.0 override
}

windowrule {
  name = steam-main-tile
  tile = on
  match:class = ^(steam)$
  match:title = ^(Steam)$
}

# Friends List flotante
windowrule {
  name = steam-friends-float
  float = on
  size = 400 800
  center = on
  stay_focused = on
  match:class = ^(steam)$
  match:title = ^(Friends List)$
}

windowrule {
  name = steam-settings-float
  float = on
  size = 900 700
  center = on
  stay_focused = on
  match:class = ^(steam)$
  match:title = ^(Steam Settings)$
}

# Properties de juegos flotante
windowrule {
  name = steam-properties-float
  float = on
  size = 800 600
  center = on
  stay_focused = on
  match:class = ^(steam)$
  match:title = ^(Properties.*)$
}

# KDE Portal
windowrule = float true,match:class ^(org.freedesktop.impl.portal.desktop.kde)$
windowrule = size 1000 600,match:class ^(org.freedesktop.impl.portal.desktop.kde)$
windowrule = center true,match:class ^(org.freedesktop.impl.portal.desktop.kde)$
windowrule = opacity 0.92 $& 0.85 $& 1,match:class ^(org.freedesktop.impl.portal.desktop.kde)$

windowrule = float true,match:class ^(hyprland-share-picker)$
windowrule = size 600 400,match:class ^(hyprland-share-picker)$
windowrule = center true,match:class ^(hyprland-share-picker)$

#Discord
windowrule = float true,match:class ^(discord)$,match:title ^(Discord Popout)$
windowrule = size 600 400,match:class ^(discord)$,match:title ^(Discord Popout)$
windowrule = center true,match:class ^(discord)$,match:title ^(Discord Popout)$
windowrule = pin true,match:class ^(discord)$,match:title ^(Discord Popout)$

windowrule = opacity 0.92 $& 0.85 $& 1,match:class ^(org.kde.dolphin)$
windowrule = opacity 0.92 $& 0.85 $& 1,match:class ^(org.pulseaudio.pavucontrol)$
windowrule = opacity 0.92 $& 0.85 $& 1,match:class ^(blueman-manager)$

windowrule = match:class ^(org.pwmt.zathura)$, float on, size 750 1000
windowrule = match:class ^(imv)$, float on
windowrule = float on, size 1000 650, center on, border_size 1, rounding 18, match:class ^(com.snes.evercal)$

windowrule = match:title (Picture in picture), float on, pin on

# LAYER RULES

# Swayosd
layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.5, match:namespace swayosd

# Rofi
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.5, match:namespace rofi

# Dunst
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.1, match:namespace notifications

# Waybar
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.3, match:namespace waybar